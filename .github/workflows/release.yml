name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Release Binary
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-release-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev meson ninja-build libwayland-dev wayland-protocols gobject-introspection libgirepository1.0-dev git

      - name: Build and install gtk4-layer-shell
        run: |
          git clone https://github.com/wmww/gtk4-layer-shell.git
          cd gtk4-layer-shell
          meson setup build -Dprefix=/usr -Dvapi=false -Dintrospection=false -Ddocs=false -Dexamples=false
          meson compile -C build
          sudo meson install -C build

      - name: Build release binary
        run: cargo build --release --verbose

      - name: Package binary
        run: |
          cd target/release
          tar czf ../../nirimap-${{ github.ref_name }}-x86_64-linux.tar.gz nirimap
          cd ../..
          sha256sum nirimap-${{ github.ref_name }}-x86_64-linux.tar.gz > nirimap-${{ github.ref_name }}-x86_64-linux.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            nirimap-${{ github.ref_name }}-x86_64-linux.tar.gz
            nirimap-${{ github.ref_name }}-x86_64-linux.tar.gz.sha256
